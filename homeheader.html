<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Trade from the Future | SciTrade</title>
    <!-- Import Oswald font -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00ffff;
            --dark-cyan: #03c9c2;
            --white: #ffffff;
            --black: #000000;
            --purple: #9d00ff;
            --blue: #0066ff;
            --pink: #ff00ff;
            /* Background image variable - REPLACE URL with your own image */
            --bg-image-url: url('https://raw.githubusercontent.com/scitrade-org/scitrade/main/assets/headerbackground.png');
            /* Clean overlay for readability */
            --overlay-dark: rgba(0, 0, 0, 0.65);
        }
        
        ::selection {
          background-color: var(--cyan);
          color: var(--black);
        }
        
        ::-moz-selection {
          background-color: var(--cyan);
          color: var(--black);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Oswald', sans-serif;
            overflow-x: hidden;
            background-color: #0a0c12;
        }
        
        .header-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            /* BACKGROUND IMAGE: replace --bg-image-url with your actual image URL */
            background-image: var(--bg-image-url);
            background-size: cover;
            background-position: center 30%;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }
        
        /* Soft dark overlay to ensure text remains crisp and clear, not shiny */
        .header-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(125deg, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.55) 100%);
            z-index: 1;
            pointer-events: none;
        }
        
        .header-content {
            position: relative;
            z-index: 20; /* Above background and canvas but below occasional flashes */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 0 20px;
            text-align: center;
            opacity: 0;
            transform: translateY(50px);
            animation: contentEntrance 1.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) forwards 0.5s;
        }
        
        /* Title style - clean, powerful, no dark/shiny gradients */
        .header-title {
            font-size: 5rem;
            font-weight: 500;
            letter-spacing: 4px;
            margin-bottom: 20px;
            color: var(--white);
            text-transform: uppercase;
            animation: titleEntrance 2s cubic-bezier(0.19, 1, 0.22, 1) forwards 0.8s;
            opacity: 0;
            transform: scale(0.92);
            /* Clean text shadow: only for depth, not shiny/glowing */
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
        }
        
        /* Highlight styling: crystal clear, solid white, no dark/shiny effects */
        .header-title .highlight {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            -webkit-text-fill-color: white;
            color: white;
            font-weight: 200;
            display: inline-block;
            /* crisp underline effect optional but clean */
            position: relative;
            letter-spacing: 2px;
        }
        
        /* Optional subtle accent line for modern look */
        .header-title .highlight::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--cyan), var(--white), var(--cyan), transparent);
            transform: scaleX(0.7);
            opacity: 0.7;
            border-radius: 2px;
        }
        
        .header-subtitle {
            font-size: 1.8rem;
            font-weight: 300;
            max-width: 800px;
            margin-bottom: 30px;
            opacity: 0;
            color: #f0f0f0;
            animation: subtitleEntrance 2s ease forwards 1.2s;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            letter-spacing: 1px;
            backdrop-filter: blur(2px);
        }
        
        .cta-button {
            display: inline-block;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
            color: var(--black);
            background: linear-gradient(45deg, var(--cyan), #3a86ff);
            border: none;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: buttonEntrance 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards 1.8s;
            opacity: 0;
            transform: translateY(20px);
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.3);
        }
        
        .cta-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 255, 255, 0.5);
            letter-spacing: 3px;
            background: linear-gradient(45deg, #3a86ff, var(--cyan));
        }
        
        .cta-button:before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }
        
        .cta-button:hover:before {
            left: 100%;
        }
        
        /* Background canvas and grid elements */
        .stock-chart {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 2;
            opacity: 0.75;
            pointer-events: none;
        }
        
        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.12) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 3;
            opacity: 0.4;
            animation: gridEntrance 3s ease forwards;
            pointer-events: none;
        }
        
        /* Improved overlay: keeps text readable, not shiny, adds depth */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 15% 25%, rgba(0, 0, 0, 0.5) 0%, transparent 65%),
                radial-gradient(circle at 85% 70%, rgba(0, 0, 0, 0.45) 0%, transparent 70%),
                radial-gradient(circle at 50% 90%, rgba(0, 20, 40, 0.5) 0%, transparent 60%);
            z-index: 4;
            animation: fadeIn 2s ease forwards;
            pointer-events: none;
        }
        
        /* data visualization line (full width) */
        .data-viz {
            position: absolute;
            width: 100%;
            height: 150px;
            bottom: 10%;
            left: 0;
            z-index: 5;
            opacity: 0;
            animation: vizEntrance 2s ease forwards 1.5s;
            pointer-events: none;
        }
        
        .data-line {
            fill: none;
            stroke: var(--cyan);
            stroke-width: 2.5;
            opacity: 0.7;
            filter: drop-shadow(0 0 2px rgba(0,255,255,0.4));
        }
        
        .data-line-purple {
            stroke: #b77eff;
            opacity: 0.55;
        }
        
        /* Animations - cleaned from aggressive shiny text-shadow */
        @keyframes titleEntrance {
            0% {
                opacity: 0;
                transform: scale(0.85);
                letter-spacing: 2px;
            }
            40% {
                letter-spacing: 8px;
                opacity: 0.95;
            }
            100% {
                opacity: 1;
                transform: scale(1);
                letter-spacing: 4px;
                text-shadow: 0 6px 14px rgba(0, 0, 0, 0.5);
            }
        }
        
        @keyframes subtitleEntrance {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes contentEntrance {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes buttonEntrance {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            50% {
                opacity: 1;
                transform: translateY(-8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes gridEntrance {
            0% {
                opacity: 0;
                transform: scale(1.2);
            }
            100% {
                opacity: 0.4;
                transform: scale(1);
            }
        }
        
        @keyframes vizEntrance {
            0% {
                opacity: 0;
                transform: translateX(-100px);
            }
            100% {
                opacity: 0.85;
                transform: translateX(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes lineDrawing {
            0% {
                stroke-dashoffset: 1200;
                opacity: 0.3;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                stroke-dashoffset: 0;
                opacity: 0.65;
            }
        }
        
        /* Intro reveal (transparent start) */
        .header-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            z-index: 30;
            animation: introReveal 1.5s cubic-bezier(0.86, 0, 0.07, 1) forwards;
            pointer-events: none;
        }
        
        @keyframes introReveal {
            0% {
                transform: scaleX(1);
                transform-origin: right;
            }
            100% {
                transform: scaleX(0);
                transform-origin: right;
            }
        }
        
        /* Flash effects (subtle, not intrusive) */
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 255, 255, 0.18);
            z-index: 25;
            opacity: 0;
            pointer-events: none;
        }
        
        #flash1 {
            animation: flashEffect 0.5s ease forwards 1.5s;
        }
        
        #flash2 {
            animation: flashEffect 0.5s ease forwards 1.7s;
        }
        
        @keyframes flashEffect {
            0% { opacity: 0; }
            40% { opacity: 0.65; }
            100% { opacity: 0; }
        }
        
        /* Responsive adjustments */
        @media screen and (max-width: 768px) {
            .header-title {
                font-size: 3.4rem;
                letter-spacing: 2px;
            }
            .header-title .highlight::after {
                bottom: -6px;
                height: 1.5px;
            }
            .header-subtitle {
                font-size: 1.4rem;
            }
            .grid-overlay {
                background-size: 30px 30px;
            }
            .cta-button {
                padding: 14px 35px;
                font-size: 1rem;
            }
            .data-viz {
                bottom: 12%;
            }
        }
        
        @media screen and (max-width: 480px) {
            .header-title {
                font-size: 2.5rem;
                letter-spacing: 1px;
            }
            .header-subtitle {
                font-size: 1.2rem;
                padding: 0 16px;
            }
            .grid-overlay {
                background-size: 20px 20px;
            }
            .cta-button {
                padding: 12px 28px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="flash" id="flash1"></div>
        <div class="flash" id="flash2"></div>
        <div class="grid-overlay"></div>
        <div class="overlay"></div>
        
        <canvas id="stockChart" class="stock-chart"></canvas>
        
        <svg class="data-viz" preserveAspectRatio="none">
            <path class="data-line" id="dataPath1"></path>
            <path class="data-line data-line-purple" id="dataPath2" style="opacity: 0.5;"></path>
        </svg>
        
        <div class="header-content">
            <h1 class="header-title">
                <span class="highlight">Trade from the Future</span>
            </h1>
            <p class="header-subtitle">Becoming the best requires having an edge, then executing.</p>
            <!-- CTA button is commented by original design, kept optional 
            <a href="#technical-product-4" class="cta-button">Start Winning Today</a> -->
        </div>
    </div>

    <script>
        // Canvas setup for dynamic stock chart and futuristic elements
        const canvas = document.getElementById('stockChart');
        const ctx = canvas.getContext('2d');
        
        const colors = {
            cyan: '#00ffff',
            purple: '#b77eff',
            blue: '#3a86ff',
            pink: '#ff66cc',
            white: '#ffffff',
            black: '#050a12'
        };
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        const CANDLE_WIDTH = 6;
        const CANDLE_GAP = 3;
        let MAX_CANDLES = Math.floor(window.innerWidth / (CANDLE_WIDTH + CANDLE_GAP)) * 1.3;
        
        let particles = [];
        const particleCount = 85;
        let candlesticks = [];
        let trendLines = [];
        let glowEffects = [];
        let frameCount = 0;
        
        function createParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 3.5 + 1,
                    speedX: (Math.random() - 0.5) * 1.2,
                    speedY: (Math.random() - 0.5) * 1.2,
                    opacity: Math.random() * 0.55 + 0.2,
                    color: Math.random() > 0.6 ? colors.cyan : colors.purple
                });
            }
        }
        
        function generatePriceData(count) {
            let prices = [];
            let basePrice = 98;
            for (let i = 0; i < count; i++) {
                const changePercent = (Math.random() - 0.5) * 5.2;
                basePrice = basePrice * (1 + changePercent / 100);
                basePrice = Math.max(basePrice, 45);
                const open = basePrice;
                const close = open * (1 + (Math.random() - 0.5) * 2.4 / 100);
                const high = Math.max(open, close) * (1 + Math.random() * 1.2 / 100);
                const low = Math.min(open, close) * (1 - Math.random() * 1.2 / 100);
                prices.push({ open, close, high, low });
            }
            return prices;
        }
        
        function createCandlesticks() {
            const prices = generatePriceData(MAX_CANDLES);
            const maxPrice = Math.max(...prices.map(p => p.high), 110);
            const minPrice = Math.min(...prices.map(p => p.low), 40);
            const range = maxPrice - minPrice;
            const heightFactor = (canvas.height * 0.55) / (range || 1);
            candlesticks = [];
            const rowPositions = [0.32, 0.52, 0.72];
            
            rowPositions.forEach((rowPos, rowIndex) => {
                for (let i = 0; i < prices.length; i++) {
                    const price = prices[i];
                    const x = i * (CANDLE_WIDTH + CANDLE_GAP) + canvas.width / 9;
                    const baseY = canvas.height * rowPos;
                    const y = baseY - (price.close - minPrice) * heightFactor * 0.55;
                    const height = Math.abs(price.open - price.close) * heightFactor * 0.55;
                    const wickTop = baseY - (price.high - minPrice) * heightFactor * 0.55;
                    const wickBottom = baseY - (price.low - minPrice) * heightFactor * 0.55;
                    const isUp = price.close > price.open;
                    const candleColor = isUp ? colors.cyan : colors.purple;
                    candlesticks.push({
                        x, y: isUp ? y : y - height, width: CANDLE_WIDTH, height: Math.max(1.2, height),
                        color: candleColor, wickTop, wickBottom,
                        speed: 0.22 + (rowIndex * 0.09), opacity: 0.7 - (rowIndex * 0.1), isUp
                    });
                }
            });
        }
        
        function createTrendLines() {
            trendLines = [];
            const lineCount = 5 + Math.floor(Math.random() * 3);
            for (let i = 0; i < lineCount; i++) {
                const startX = Math.random() * (canvas.width / 1.8);
                const startY = Math.random() * canvas.height;
                const length = Math.random() * (canvas.width - startX) + canvas.width / 5;
                const angle = (Math.random() - 0.5) * 18;
                const lineColor = Math.random() > 0.5 ? colors.cyan : colors.purple;
                trendLines.push({
                    x: startX, y: startY, length, angle, width: Math.random() * 1.5 + 0.8,
                    opacity: Math.random() * 0.35 + 0.1, color: lineColor
                });
            }
        }
        
        function createGlowEffects() {
            glowEffects = [];
            const effectCount = 8;
            for (let i = 0; i < effectCount; i++) {
                const isCyan = Math.random() > 0.5;
                glowEffects.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    radius: Math.random() * 180 + 100, opacity: Math.random() * 0.2 + 0.06,
                    pulseSpeed: Math.random() * 0.008 + 0.004, pulseDirection: 1, currentOpacity: 0.1,
                    color: isCyan ? colors.cyan : colors.purple
                });
            }
        }
        
        function initSVGPaths() {
            const dataViz = document.querySelector('.data-viz');
            const dataPath1 = document.getElementById('dataPath1');
            const dataPath2 = document.getElementById('dataPath2');
            const width = window.innerWidth;
            const height = 150;
            
            let path1 = `M0,${height/2 + 10}`;
            let path2 = `M0,${height/2 - 5}`;
            const segments = 120;
            const segmentWidth = width / segments;
            
            for (let i = 0; i <= segments; i++) {
                const x = i * segmentWidth;
                const y1 = height/2 + Math.sin(x/22) * 38 + Math.sin(x/9) * 18 + Math.cos(x/45) * 12;
                const y2 = height/2 + Math.cos(x/28) * 44 + Math.cos(x/14) * 22 + Math.sin(x/55) * 14;
                path1 += ` L${x},${y1}`;
                path2 += ` L${x},${y2}`;
            }
            dataPath1.setAttribute('d', path1);
            dataPath2.setAttribute('d', path2);
            
            const len1 = dataPath1.getTotalLength();
            const len2 = dataPath2.getTotalLength();
            dataPath1.style.strokeDasharray = len1;
            dataPath1.style.strokeDashoffset = len1;
            dataPath1.style.animation = 'lineDrawing 12s infinite linear';
            dataPath2.style.strokeDasharray = len2;
            dataPath2.style.strokeDashoffset = len2;
            dataPath2.style.animation = 'lineDrawing 16s infinite linear reverse';
        }
        
        function init() {
            resizeCanvas();
            createParticles();
            createCandlesticks();
            createTrendLines();
            createGlowEffects();
            initSVGPaths();
            animate();
            
            setInterval(() => {
                createCandlesticks();
                createTrendLines();
                glowEffects.forEach((effect, idx) => {
                    if (idx % 2 === 0) {
                        effect.x = Math.random() * canvas.width;
                        effect.y = Math.random() * canvas.height;
                    }
                });
            }, 14000);
            
            window.addEventListener('resize', () => {
                resizeCanvas();
                MAX_CANDLES = Math.floor(window.innerWidth / (CANDLE_WIDTH + CANDLE_GAP)) * 1.3;
                createCandlesticks();
                createTrendLines();
                setTimeout(initSVGPaths, 120);
            });
        }
        
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;
            
            // Draw glow effects (pulsating soft glow)
            glowEffects.forEach(effect => {
                effect.currentOpacity += effect.pulseSpeed * effect.pulseDirection;
                if (effect.currentOpacity >= effect.opacity) effect.pulseDirection = -1;
                else if (effect.currentOpacity <= 0.03) effect.pulseDirection = 1;
                
                const gradient = ctx.createRadialGradient(effect.x, effect.y, 0, effect.x, effect.y, effect.radius);
                const alphaHex = Math.floor(effect.currentOpacity * 255).toString(16).padStart(2, '0');
                gradient.addColorStop(0, `${effect.color}${alphaHex}`);
                gradient.addColorStop(1, `${effect.color}00`);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(effect.x, effect.y, effect.radius, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Draw trend lines
            trendLines.forEach(line => {
                ctx.save();
                ctx.translate(line.x, line.y);
                ctx.rotate(line.angle * Math.PI / 180);
                const grad = ctx.createLinearGradient(0, 0, line.length, 0);
                grad.addColorStop(0, `${line.color}00`);
                grad.addColorStop(0.5, `${line.color}${Math.floor(line.opacity * 255).toString(16).padStart(2, '0')}`);
                grad.addColorStop(1, `${line.color}00`);
                ctx.strokeStyle = grad;
                ctx.lineWidth = line.width;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(line.length, 0);
                ctx.stroke();
                ctx.restore();
            });
            
            // Animated candlesticks
            candlesticks.forEach(candle => {
                candle.x -= candle.speed;
                if (candle.x + candle.width < 0) candle.x = canvas.width;
                ctx.strokeStyle = candle.color;
                ctx.globalAlpha = candle.opacity * 0.9;
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(candle.x + candle.width / 2, candle.wickTop);
                ctx.lineTo(candle.x + candle.width / 2, candle.wickBottom);
                ctx.stroke();
                const grad = ctx.createLinearGradient(candle.x, candle.y, candle.x, candle.y + candle.height);
                if (candle.isUp) {
                    grad.addColorStop(0, `${colors.cyan}${Math.floor(candle.opacity * 200).toString(16).padStart(2, '0')}`);
                    grad.addColorStop(1, `${colors.cyan}30`);
                } else {
                    grad.addColorStop(0, `${colors.purple}${Math.floor(candle.opacity * 200).toString(16).padStart(2, '0')}`);
                    grad.addColorStop(1, `${colors.purple}30`);
                }
                ctx.fillStyle = grad;
                ctx.fillRect(candle.x, candle.y, candle.width, Math.max(1, candle.height));
                ctx.globalAlpha = 1;
            });
            
            // Particles drifting
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.fillStyle = `${p.color}${Math.floor(p.opacity * 210).toString(16).padStart(2, '0')}`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        window.addEventListener('load', () => {
            init();
        });
        
        window.addEventListener('resize', () => {
            setTimeout(() => {
                if (window.innerWidth !== canvas.width) {
                    resizeCanvas();
                }
            }, 60);
        });
    </script>
</body>
</html>
