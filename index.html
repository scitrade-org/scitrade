<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SciTrade - Home</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/scitrade-org/scitrade/main/Images/scitradelogotransp.png">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Import fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00ffff;
            --dark-cyan: #03c9c2;
            --white: #ffffff;
            --black: #000000;
            --transparent-black: rgba(0, 0, 0, 0.7);
            --red: #03fcf4;
            --gray-bg: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.8);
            --purple: #9d00ff;
            --blue: #0066ff;
            --green: #00ff88;
            --pink: #ff00ff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            background-color: var(--black);
            overflow-x: hidden;
            font-family: 'Roboto', sans-serif;
        }

        /* Custom Scrollbar - Enhanced */
        ::-webkit-scrollbar {
            width: 14px;
            height: 14px;
        }

        ::-webkit-scrollbar-track {
            background: linear-gradient(180deg, var(--black), #111);
            border-radius: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, var(--purple), var(--blue), var(--cyan), var(--red));
            border-radius: 8px;
            border: 2px solid var(--black);
            transition: all 0.4s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(45deg, var(--red), var(--cyan), var(--blue), var(--purple));
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.8);
            transform: scale(1.08);
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: var(--purple) var(--black);
        }

        ::selection {
            background: linear-gradient(45deg, var(--red), var(--cyan));
            color: var(--black);
        }

        ::-moz-selection {
            background: linear-gradient(45deg, var(--red), var(--cyan));
            color: var(--black);
        }

        /* --- NAVIGATION BAR --- */
        .sci-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 0;
            z-index: 1000;
            background-color: transparent;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif !important;
        }

        .sci-navbar * {
            font-family: 'Rajdhani', sans-serif !important;
        }

        .sci-navbar.scrolled {
            padding: 10px 0;
            /* Seamless dark gradient without harsh shadows or glowing borders */
            background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
            backdrop-filter: blur(8px);
            /* No box-shadow to keep it smooth and integrated */
            box-shadow: none;
            border-bottom: none;
        }

        .sci-nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .sci-logo-container {
            display: flex;
            align-items: center;
            margin-right: auto;
        }

        .sci-logo {
            height: 40px;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 0 5px rgba(0, 255, 255, 0.5));
        }

        .sci-logo:hover {
            transform: scale(1.1) rotate(5deg);
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.9));
        }

        .sci-brand-name {
            font-family: 'Rajdhani', sans-serif !important;
            font-size: 18px;
            font-weight: 500;
            text-decoration: none;
            color: var(--white);
            margin-left: 12px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .sci-logo-container:hover .sci-brand-name {
            color: var(--cyan);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.7);
        }

        .sci-nav-links {
            display: flex;
            list-style: none;
            gap: 10px;
            margin-left: auto;
        }

        .sci-nav-item {
            font-family: 'Rajdhani', sans-serif !important;
        }

        .sci-nav-link {
            position: relative;
            padding: 8px 16px;
            color: var(--white);
            text-decoration: none;
            letter-spacing: 1px;
            font-size: 18px;
            font-weight: 400;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif !important;
        }

        .sci-nav-link::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--purple), var(--cyan));
            transition: width 0.3s ease, left 0.3s ease;
            transform: translateX(-50%);
            border-radius: 1px;
        }

        .sci-nav-link:hover {
            color: var(--cyan);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .sci-nav-link:hover::after {
            width: calc(100% - 32px);
            left: 50%;
        }

        .sci-nav-link.active {
            color: var(--cyan);
        }

        .sci-nav-link.active::after {
            width: calc(100% - 32px);
            left: 50%;
        }

        .sci-mobile-toggle {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            color: var(--white);
            font-size: 24px;
            transition: all 0.3s ease;
        }

        .sci-mobile-toggle:hover {
            color: var(--cyan);
            transform: scale(1.1);
        }

        /* Animated hamburger menu */
        .sci-hamburger {
            width: 30px;
            height: 20px;
            position: relative;
            margin: 0 auto;
            transform: rotate(0deg);
            transition: .5s ease-in-out;
            cursor: pointer;
        }

        .sci-hamburger span {
            display: block;
            position: absolute;
            height: 2px;
            width: 100%;
            background: var(--white);
            border-radius: 9px;
            opacity: 1;
            left: 0;
            transform: rotate(0deg);
            transition: .25s ease-in-out;
        }

        .sci-hamburger span:nth-child(1) {
            top: 0px;
        }

        .sci-hamburger span:nth-child(2),
        .sci-hamburger span:nth-child(3) {
            top: 9px;
        }

        .sci-hamburger span:nth-child(4) {
            top: 18px;
        }

        .sci-hamburger.open span:nth-child(1) {
            top: 9px;
            width: 0%;
            left: 50%;
        }

        .sci-hamburger.open span:nth-child(2) {
            transform: rotate(45deg);
            background: var(--cyan);
        }

        .sci-hamburger.open span:nth-child(3) {
            transform: rotate(-45deg);
            background: var(--cyan);
        }

        .sci-hamburger.open span:nth-child(4) {
            top: 9px;
            width: 0%;
            left: 50%;
        }

        /* Scroll indicator */
        .sci-scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--purple), var(--blue), var(--cyan), var(--red));
            z-index: 1001;
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: 0 0 10px rgba(157, 0, 255, 0.5);
        }
        
        .container {
            width: 100%;
            margin: 0 auto;
        }
        
        /* Header wrapper for relative positioning (scroll button) */
        .header-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }
        
        /* Seamless transition from header to content: increased space and smooth fade */
        .header-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 160px; /* Increased for a little extra space between header and content */
            background: linear-gradient(to top, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 20;
        }
        
        .header-overlay {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .header-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        
        /* === SMOOTH SCROLL DOWN BUTTON: white, no circle, just V === */
        .scroll-down-arrow {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            border-radius: 0 !important;
            width: auto;
            height: auto;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: gentleFloat 2s infinite ease-in-out;
        }
        
        .scroll-down-arrow i {
            font-size: 32px;
            color: white;
            text-shadow: 0 0 4px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        
        .scroll-down-arrow:hover {
            transform: translateX(-50%) translateY(4px);
        }
        
        .scroll-down-arrow:hover i {
            transform: translateY(3px);
        }
        
        @keyframes gentleFloat {
            0% { transform: translateX(-50%) translateY(0px); opacity: 0.8; }
            50% { transform: translateX(-50%) translateY(8px); opacity: 1; }
            100% { transform: translateX(-50%) translateY(0px); opacity: 0.8; }
        }
        
        /* Content Sections - SEAMLESS merging with black gradients */
        .content-sections {
            position: relative;
            z-index: 10;
            background-color: var(--black);
        }
        
        /* iframe container: no margins, relative for overlays */
        .iframe-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            background: transparent;
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 0;
            transform: translateY(18px);
        }
        
        .iframe-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Seamless gradient transition: each container fades its bottom into black, 
           and the next container fades from black into its content */
        .iframe-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
            opacity: 1;
        }
        
        /* For the first container, we also add a soft fade-in at top (from header) */
        .iframe-container:first-of-type::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
            opacity: 1;
        }
        
        /* For other containers, a tiny top fade to blend with previous bottom fade */
        .iframe-container:not(:first-of-type)::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
            opacity: 1;
        }
        
        /* Remove any default borders/shadow/radius */
        .iframe-container iframe {
            width: 100% !important;
            border: none !important;
            display: block !important;
            background: var(--black) !important;
            opacity: 1 !important;
            visibility: visible !important;
            margin: 0 !important;
            padding: 0 !important;
            vertical-align: middle;
        }
        
        /* First iframe (description) - taller */
        .iframe-container.description-iframe iframe {
            height: 700px !important;
        }
        
        /* Other iframes */
        .iframe-container:not(.description-iframe) iframe {
            height: 600px !important;
        }
        
        /* Hide iframe scrollbars */
        iframe {
            overflow: hidden !important;
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }
        
        iframe::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }
        
        /* Moving Background */
        .moving-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(157, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 50%);
            opacity: 0.8;
            z-index: -1;
        }
        
        /* Footer Container - completely seamless, no visible separator */
        .footer-container {
            width: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            position: relative;
            background: var(--black);
        }
        
        /* Only a subtle blend from last section, no visible line or glow separator */
        .footer-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }
        
        /* Remove any extra lines or separators */
        .footer-container::after {
            display: none;
        }
        
        .footer-container iframe {
            width: 100%;
            height: 500px;
            border: none;
            overflow: hidden;
            display: block;
            margin: 0;
            padding: 0;
            background: var(--black);
        }
        
        /* Responsive Design */
        @media screen and (max-width: 768px) {
            /* Mobile Navigation */
            .sci-nav-links {
                position: fixed;
                top: 70px;
                left: 0;
                width: 100%;
                flex-direction: column;
                align-items: center;
                background: linear-gradient(180deg, rgba(0, 0, 0, 0.98) 0%, rgba(10, 10, 10, 0.95) 100%);
                padding: 20px 0;
                clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
                transition: clip-path 0.5s ease-in-out;
                box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5);
                gap: 0;
                z-index: 999;
                backdrop-filter: blur(10px);
            }

            .sci-nav-links.open {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }

            .sci-nav-item {
                width: 100%;
                text-align: center;
            }

            .sci-nav-link {
                display: block;
                padding: 18px 0;
                font-size: 22px;
                width: 100%;
            }

            .sci-nav-link::after {
                bottom: 5px;
            }

            .sci-nav-link:hover::after {
                width: 50%;
            }

            .sci-nav-link:hover {
                background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            }

            .sci-mobile-toggle {
                display: block;
            }
            
            .header-wrapper {
                height: 80vh;
            }
            
            .scroll-down-arrow {
                bottom: 18px;
            }
            
            .scroll-down-arrow i {
                font-size: 28px;
            }
            
            .iframe-container {
                max-width: 100%;
            }
            
            .iframe-container.description-iframe iframe {
                height: 520px !important;
            }
            
            .iframe-container:not(.description-iframe) iframe {
                height: 460px !important;
            }
            
            .footer-container iframe {
                height: 450px;
            }
            
            .iframe-container::after,
            .iframe-container:first-of-type::before,
            .iframe-container:not(:first-of-type)::before {
                height: 50px;
            }
            
            .header-wrapper::after {
                height: 120px; /* Slightly less on mobile but still adds space */
            }
        }
        
        @media screen and (max-width: 480px) {
            .header-wrapper {
                height: 70vh;
            }
            
            .scroll-down-arrow i {
                font-size: 24px;
            }
            
            .iframe-container.description-iframe iframe {
                height: 480px !important;
            }
            
            .iframe-container:not(.description-iframe) iframe {
                height: 420px !important;
            }
            
            .footer-container iframe {
                height: 400px;
            }
            
            .iframe-container::after,
            .iframe-container:first-of-type::before,
            .iframe-container:not(:first-of-type)::before {
                height: 40px;
            }
            
            .header-wrapper::after {
                height: 100px;
            }
        }
        
        @media screen and (max-width: 360px) {
            .iframe-container.description-iframe iframe {
                height: 450px !important;
            }
            .iframe-container:not(.description-iframe) iframe {
                height: 380px !important;
            }
        }
        
        /* touch-friendly */
        @media (hover: none) and (pointer: coarse) {
            .scroll-down-arrow {
                bottom: 20px;
            }
            .scroll-down-arrow i {
                font-size: 34px;
            }
        }
    </style>
</head>
<body>
    <!-- Scroll Progress Bar -->
    <div class="sci-scroll-progress" id="scrollProgress"></div>
    
    <!-- Navigation Bar -->
    <nav class="sci-navbar" id="sciNavbar">
        <div class="sci-nav-container">
            <div class="sci-logo-container">
                <a href="index.html">
                    <img src="https://raw.githubusercontent.com/scitrade-org/scitrade/main/Logo/scitradelogotransp.png" alt="SciTrade Logo" class="sci-logo">
                </a>
                <a href="index.html" class="sci-brand-name">SciTrade</a>
            </div>

            <ul class="sci-nav-links" id="sciNavLinks">
                <li class="sci-nav-item">
                    <a href="index.html" class="sci-nav-link active">Home</a>
                </li>
                <li class="sci-nav-item">
                    <a href="products.html" class="sci-nav-link">Products</a>
                </li>
                <li class="sci-nav-item">
                    <a href="mission.html" class="sci-nav-link">Mission</a>
                </li>
                <li class="sci-nav-item">
                    <a href="contact.html" class="sci-nav-link">Contact</a>
                </li>
            </ul>

            <button class="sci-mobile-toggle" id="mobileToggle">
                <div class="sci-hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </button>
        </div>
    </nav>

    <div class="moving-bg"></div>
    
    <div class="container">
        <!-- Animated Header Overlay with Scroll Button -->
        <div class="header-wrapper">
            <div class="header-overlay">
                <iframe src="https://scitrade.org/homeheader.html" 
                        scrolling="no" 
                        frameborder="0"
                        loading="eager"
                        allowtransparency="true"
                        title="SciTrade Hero Header">
                </iframe>
            </div>
            <!-- Smooth scroll down button: white V, no circle, clean -->
            <div class="scroll-down-arrow" id="scrollDownBtn" aria-label="Scroll down">
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        
        <div class="content-sections">
            <!-- All iframes seamlessly stacked with gradient transitions, zero gaps -->
            <div class="iframe-container description-iframe visible" id="description">
                <iframe src="https://scitrade.org/description.html" 
                        scrolling="no" 
                        frameborder="0"
                        loading="eager"
                        allowtransparency="true"
                        title="SciTrade Description">
                </iframe>
            </div>

            <div class="iframe-container" id="coreQualities">
                <iframe src="https://scitrade.org/corequalities.html" 
                        scrolling="no" 
                        frameborder="0"
                        loading="eager"
                        allowtransparency="true"
                        title="Core Qualities">
                </iframe>
            </div>

            <div class="iframe-container" id="carouselSection">
                <iframe src="https://scitrade.org/carousel.html" 
                        scrolling="no" 
                        frameborder="0"
                        loading="eager"
                        allowtransparency="true"
                        title="Carousel Showcase">
                </iframe>
            </div>

            <div class="iframe-container" id="whyChooseUs">
                <iframe src="https://scitrade.org/whychooseus.html" 
                        scrolling="no" 
                        frameborder="0"
                        loading="eager"
                        allowtransparency="true"
                        title="Why Choose Us">
                </iframe>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <div class="footer-container">
      <iframe src="https://scitrade.org/footer.html" 
              scrolling="no" 
              frameborder="0" 
              allowtransparency="true"
              loading="eager"
              title="Footer">
      </iframe>
    </div>
    
    <script>
        // Mobile menu toggle
        const mobileToggle = document.getElementById('mobileToggle');
        const navLinks = document.getElementById('sciNavLinks');
        const hamburger = document.querySelector('.sci-hamburger');
        
        if (mobileToggle) {
            mobileToggle.addEventListener('click', function() {
                navLinks.classList.toggle('open');
                hamburger.classList.toggle('open');
            });
        }

        // Close mobile menu when clicking a link
        document.querySelectorAll('.sci-nav-link').forEach(link => {
            link.addEventListener('click', function() {
                if (navLinks.classList.contains('open')) {
                    navLinks.classList.remove('open');
                    hamburger.classList.remove('open');
                }
            });
        });
        
        // ========== CUSTOM ULTRA-SMOOTH SCROLL (no teleport) ==========
        function smoothScrollToElement(element, duration = 1000) {
            if (!element) return;
            const targetPosition = element.getBoundingClientRect().top + window.pageYOffset;
            const startPosition = window.pageYOffset;
            const distance = targetPosition - startPosition;
            let startTime = null;
            
            function animation(currentTime) {
                if (startTime === null) startTime = currentTime;
                const timeElapsed = currentTime - startTime;
                const progress = Math.min(timeElapsed / duration, 1);
                // cubic-bezier easing for smooth deceleration
                const ease = 1 - Math.pow(1 - progress, 3);
                window.scrollTo(0, startPosition + distance * ease);
                if (timeElapsed < duration) requestAnimationFrame(animation);
            }
            requestAnimationFrame(animation);
        }
        
        const scrollBtn = document.getElementById('scrollDownBtn');
        if (scrollBtn) {
            scrollBtn.addEventListener('click', function(e) {
                e.preventDefault();
                // Target the first .iframe-container inside .content-sections
                const firstSection = document.querySelector('.content-sections .iframe-container');
                if (firstSection) {
                    smoothScrollToElement(firstSection, 1000);
                } else {
                    // fallback: scroll by 85% of viewport height
                    const targetY = window.scrollY + window.innerHeight * 0.85;
                    smoothScrollToElement({ getBoundingClientRect: () => ({ top: targetY - window.scrollY }) }, 800);
                }
            });
        }
        
        // Intersection Observer for iframe fade-in animation
        document.addEventListener('DOMContentLoaded', function() {
            const iframeContainers = document.querySelectorAll('.iframe-container');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.05,
                rootMargin: '0px 0px -20px 0px'
            });
            
            iframeContainers.forEach(container => {
                observer.observe(container);
            });
        });
        
        // Navbar scroll effect + progress bar
        window.addEventListener('scroll', function() {
            const navbar = document.getElementById('sciNavbar');
            const scrollProgress = document.getElementById('scrollProgress');
            
            if (window.scrollY > 100) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
            
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            if (scrollProgress) scrollProgress.style.width = scrolled + '%';
        });
        
        // Adjust iframe heights dynamically for mobile/responsive
        function adjustIframeHeights() {
            const isMobile = window.innerWidth <= 768;
            const isSmallMobile = window.innerWidth <= 480;
            const isTiny = window.innerWidth <= 360;
            
            const descriptionIframe = document.querySelector('.description-iframe iframe');
            const otherIframes = document.querySelectorAll('.iframe-container:not(.description-iframe) iframe');
            
            if (descriptionIframe) {
                if (isTiny) descriptionIframe.style.height = '450px';
                else if (isSmallMobile) descriptionIframe.style.height = '480px';
                else if (isMobile) descriptionIframe.style.height = '520px';
                else descriptionIframe.style.height = '700px';
            }
            
            otherIframes.forEach(iframe => {
                if (isTiny) iframe.style.height = '380px';
                else if (isSmallMobile) iframe.style.height = '420px';
                else if (isMobile) iframe.style.height = '460px';
                else iframe.style.height = '600px';
            });
            
            const footerIframe = document.querySelector('.footer-container iframe');
            if (footerIframe) {
                if (isTiny) footerIframe.style.height = '380px';
                else if (isSmallMobile) footerIframe.style.height = '400px';
                else if (isMobile) footerIframe.style.height = '450px';
                else footerIframe.style.height = '500px';
            }
            
            const headerWrapper = document.querySelector('.header-wrapper');
            if (headerWrapper) {
                if (isMobile) headerWrapper.style.height = '80vh';
                else headerWrapper.style.height = '100vh';
            }
        }
        
        window.addEventListener('load', adjustIframeHeights);
        window.addEventListener('resize', adjustIframeHeights);
        
        // ensure iframes content background is black for seamless blending
        const style = document.createElement('style');
        style.textContent = `iframe body { background: #000 !important; margin:0 !important; }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
