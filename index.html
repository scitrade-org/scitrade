<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SciTrade - Home</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/scitrade-org/scitrade/main/Images/scitradelogotransp.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan-muted: #3ab8b8;
            --purple-muted: #7b5ea7;
            --cyan-dim: rgba(58, 184, 184, 0.12);
            --purple-dim: rgba(123, 94, 167, 0.12);
            --black: #000000;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: auto;
        }
        
        body {
            background-color: var(--black);
            overflow-x: hidden;
            font-family: 'Roboto', sans-serif;
        }

        /* Clean gray scrollbar - not purple */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--black);
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: #2a2a2a var(--black);
        }

        ::selection {
            background: var(--cyan-muted);
            color: var(--black);
        }

        /* --- NAVIGATION BAR (matching mission/contact/products) --- */
        .sci-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 0;
            z-index: 1000;
            background-color: transparent;
            transition: background 0.25s ease, padding 0.25s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .sci-navbar.scrolled {
            padding: 10px 0;
            background: rgba(8, 8, 8, 0.98);
            border-bottom: 1px solid #1a1a1a;
        }

        .sci-nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .sci-logo-container {
            display: flex;
            align-items: center;
        }

        .sci-logo {
            height: 36px;
            transition: opacity 0.2s ease;
        }

        .sci-logo:hover {
            opacity: 0.8;
        }

        .sci-brand-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            font-weight: 500;
            text-decoration: none;
            color: var(--white);
            margin-left: 12px;
            letter-spacing: 1px;
            transition: color 0.2s ease;
        }

        .sci-logo-container:hover .sci-brand-name {
            color: var(--cyan-muted);
        }

        .sci-nav-links {
            display: flex;
            list-style: none;
            gap: 8px;
        }

        .sci-nav-link {
            position: relative;
            padding: 8px 16px;
            color: #c0c0c0;
            text-decoration: none;
            letter-spacing: 1px;
            font-size: 17px;
            font-weight: 400;
            transition: color 0.2s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .sci-nav-link:hover {
            color: var(--cyan-muted);
        }

        .sci-nav-link.active {
            color: var(--cyan-muted);
            border-bottom: 1px solid var(--cyan-dim);
        }

        .sci-mobile-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .sci-hamburger {
            width: 24px;
            height: 18px;
            position: relative;
        }

        .sci-hamburger span {
            display: block;
            position: absolute;
            height: 2px;
            width: 100%;
            background: #c0c0c0;
            border-radius: 2px;
            transition: 0.2s ease;
        }

        .sci-hamburger span:nth-child(1) { top: 0; }
        .sci-hamburger span:nth-child(2), 
        .sci-hamburger span:nth-child(3) { top: 8px; }
        .sci-hamburger span:nth-child(4) { top: 16px; }

        .sci-hamburger.open span:nth-child(1),
        .sci-hamburger.open span:nth-child(4) {
            opacity: 0;
        }

        .sci-hamburger.open span:nth-child(2) {
            transform: rotate(45deg);
            background: var(--cyan-muted);
        }

        .sci-hamburger.open span:nth-child(3) {
            transform: rotate(-45deg);
            background: var(--cyan-muted);
        }

        .sci-scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            height: 2px;
            background: var(--cyan-muted);
            z-index: 1001;
            width: 0%;
            transition: width 0.1s ease;
            box-shadow: 0 0 6px rgba(58, 184, 184, 0.3);
        }

        /* --- COOKIE BANNER (non-intrusive, bottom left) --- */
        .cookie-banner {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            max-width: 380px;
            background: rgba(8, 8, 8, 0.98);
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            padding: 16px 20px;
            z-index: 9999;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
            font-family: 'Roboto', sans-serif;
        }

        .cookie-banner.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px);
            pointer-events: none;
        }

        .cookie-banner p {
            color: #b0b0b0;
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 14px;
        }

        .cookie-banner a {
            color: var(--cyan-muted);
            text-decoration: none;
            border-bottom: 1px solid rgba(58, 184, 184, 0.3);
        }

        .cookie-banner a:hover {
            border-bottom-color: var(--cyan-muted);
        }

        .cookie-buttons {
            display: flex;
            gap: 10px;
        }

        .cookie-btn {
            padding: 6px 18px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
        }

        .cookie-btn.accept {
            background: var(--cyan-muted);
            color: var(--black);
            border: 1px solid var(--cyan-muted);
        }

        .cookie-btn.accept:hover {
            background: transparent;
            color: var(--cyan-muted);
        }

        .cookie-btn.reject {
            background: transparent;
            color: #888;
            border: 1px solid #333;
        }

        .cookie-btn.reject:hover {
            border-color: #555;
            color: #aaa;
        }

        /* --- HEADER WRAPPER (extra space below) --- */
        .header-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        .header-wrapper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px; /* Increased for extra space */
            background: linear-gradient(to top, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 20;
        }

        .header-overlay {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .header-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* --- SCROLL DOWN ARROW --- */
        .scroll-down-arrow {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            cursor: pointer;
            transition: all 0.25s ease;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            border-radius: 0 !important;
            width: auto;
            height: auto;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: gentleFloat 2s infinite ease-in-out;
        }

        .scroll-down-arrow i {
            font-size: 32px;
            color: white;
            text-shadow: 0 0 4px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }

        .scroll-down-arrow:hover {
            transform: translateX(-50%) translateY(4px);
        }

        .scroll-down-arrow:hover i {
            transform: translateY(3px);
        }

        @keyframes gentleFloat {
            0% { transform: translateX(-50%) translateY(0px); opacity: 0.8; }
            50% { transform: translateX(-50%) translateY(8px); opacity: 1; }
            100% { transform: translateX(-50%) translateY(0px); opacity: 0.8; }
        }

        /* --- CONTENT SECTIONS --- */
        .content-sections {
            position: relative;
            z-index: 10;
            background-color: var(--black);
        }

        .iframe-container {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            background: transparent;
            transition: opacity 0.5s ease, transform 0.5s ease;
            opacity: 0;
            transform: translateY(18px);
        }

        .iframe-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .iframe-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to top, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
            opacity: 1;
        }

        .iframe-container:first-of-type::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
            opacity: 1;
        }

        .iframe-container:not(:first-of-type)::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
            pointer-events: none;
            z-index: 3;
            opacity: 1;
        }

        .iframe-container iframe {
            width: 100% !important;
            border: none !important;
            display: block !important;
            background: var(--black) !important;
            margin: 0 !important;
            padding: 0 !important;
            vertical-align: middle;
        }

        .iframe-container.description-iframe iframe {
            height: 700px !important;
        }

        .iframe-container:not(.description-iframe) iframe {
            height: 600px !important;
        }

        iframe {
            overflow: hidden !important;
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

        iframe::-webkit-scrollbar {
            display: none !important;
        }

        /* Moving Background */
        .moving-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, var(--purple-dim) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, var(--cyan-dim) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(58, 184, 184, 0.05) 0%, transparent 50%);
            opacity: 0.8;
            z-index: -1;
        }

        /* Footer Container */
        .footer-container {
            width: 100%;
            margin: 0;
            padding: 0;
            border: 0;
            position: relative;
            background: var(--black);
        }

        .footer-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, var(--black) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        .footer-container iframe {
            width: 100%;
            height: 500px;
            border: none;
            overflow: hidden;
            display: block;
            margin: 0;
            padding: 0;
            background: var(--black);
        }

        /* --- RESPONSIVE --- */
        @media screen and (max-width: 768px) {
            .sci-nav-container {
                padding: 0 20px;
            }

            .sci-nav-links {
                position: fixed;
                top: 66px;
                left: 0;
                width: 100%;
                flex-direction: column;
                align-items: center;
                background: #080808;
                padding: 20px 0;
                clip-path: polygon(0 0, 100% 0, 100% 0, 0 0);
                transition: clip-path 0.3s ease;
                gap: 0;
                z-index: 999;
                border-bottom: 1px solid #151515;
            }

            .sci-nav-links.open {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }

            .sci-nav-item {
                width: 100%;
                text-align: center;
            }

            .sci-nav-link {
                display: block;
                padding: 16px 0;
                font-size: 20px;
                width: 100%;
            }

            .sci-nav-link.active {
                border-bottom: none;
                background: rgba(58, 184, 184, 0.05);
            }

            .sci-mobile-toggle {
                display: block;
            }

            .header-wrapper {
                height: 80vh;
            }

            .header-wrapper::after {
                height: 150px;
            }

            .scroll-down-arrow {
                bottom: 18px;
            }

            .scroll-down-arrow i {
                font-size: 28px;
            }

            .cookie-banner {
                left: 16px;
                right: 16px;
                bottom: 16px;
                max-width: none;
            }

            .iframe-container.description-iframe iframe {
                height: 520px !important;
            }

            .iframe-container:not(.description-iframe) iframe {
                height: 460px !important;
            }

            .footer-container iframe {
                height: 450px;
            }
        }

        @media screen and (max-width: 480px) {
            .header-wrapper {
                height: 70vh;
            }

            .header-wrapper::after {
                height: 120px;
            }

            .scroll-down-arrow i {
                font-size: 24px;
            }

            .cookie-buttons {
                flex-direction: column;
            }

            .iframe-container.description-iframe iframe {
                height: 480px !important;
            }

            .iframe-container:not(.description-iframe) iframe {
                height: 420px !important;
            }

            .footer-container iframe {
                height: 400px;
            }
        }

        @media screen and (min-width: 1400px) {
            .sci-nav-container,
            .iframe-container {
                max-width: 1300px;
            }
        }
    </style>
</head>
<body>
    <div class="sci-scroll-progress" id="scrollProgress"></div>
    
    <!-- Navigation Bar (updated to match other pages) -->

    <!-- Cookie Consent Banner -->

    <div class="moving-bg"></div>
    
    <div class="container">
        <!-- Header with iframe -->
        <div class="header-wrapper">

                <iframe src="https://scitrade.org/homeheader.html" 
                        scrolling="no" 
                        frameborder="0"
                        loading="eager"
                        allowtransparency="true"
                        title="SciTrade Hero Header">
                </iframe>
            </div>
            <div class="scroll-down-arrow" id="scrollDownBtn" aria-label="Scroll down">
                <i class="fas fa-chevron-down"></i>
            </div>
        </div>
        
        <div class="content-sections">
            <div class="iframe-container description-iframe visible" id="description">
                <br></br>
                <iframe src="https://scitrade.org/description.html" 
                        scrolling="no"

                        loading="eager"

                        title="SciTrade Description">
                </iframe>

            <div class="iframe-container" id="coreQualities">
                <iframe src="https://scitrade.org/corequalities.html" 
                        scrolling="no"

                </iframe>

            <div class="iframe-container" id="carouselSection">

                scrolling="no"

                title="Footer">

    </div>
    
    <script>
        (function() {
            // Mobile menu toggle
            const mobileToggle = document.getElementById('mobileToggle');
            const navLinks = document.getElementById('sciNavLinks');
            const hamburger = document.querySelector('.sci-hamburger');
            
            if (mobileToggle) {
                mobileToggle.addEventListener('click', function() {
                    navLinks.classList.toggle('open');
                    hamburger.classList.toggle('open');
                });
            }

            document.querySelectorAll('.sci-nav-link').forEach(link => {
                link.addEventListener('click', function() {
                    if (navLinks.classList.contains('open')) {
                        navLinks.classList.remove('open');
                        hamburger.classList.remove('open');
                    }
                });
            });

            // Navbar scroll effect
            const navbar = document.getElementById('sciNavbar');
            const scrollProgress = document.getElementById('scrollProgress');
            
            window.addEventListener('scroll', function() {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
                
                const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                if (scrollProgress) scrollProgress.style.width = scrolled + '%';
            });

            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            }

            // Smooth scroll function
            function smoothScrollToElement(element, duration = 800) {
                if (!element) return;
                const targetPosition = element.getBoundingClientRect().top + window.pageYOffset;
                const startPosition = window.pageYOffset;
                const distance = targetPosition - startPosition;
                let startTime = null;
                
                function animation(currentTime) {
                    if (startTime === null) startTime = currentTime;
                    const timeElapsed = currentTime - startTime;
                    const progress = Math.min(timeElapsed / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 3);
                    window.scrollTo(0, startPosition + distance * ease);
                    if (timeElapsed < duration) requestAnimationFrame(animation);
                }
                requestAnimationFrame(animation);
            }

            // Scroll down button
            const scrollBtn = document.getElementById('scrollDownBtn');
            if (scrollBtn) {
                scrollBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const firstSection = document.querySelector('.content-sections .iframe-container');
                    if (firstSection) {
                        smoothScrollToElement(firstSection, 800);
                    }
                });
            }

            // Intersection Observer for fade-in
            const iframeContainers = document.querySelectorAll('.iframe-container');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });
            
            iframeContainers.forEach(container => observer.observe(container));

            // Cookie consent
            const cookieBanner = document.getElementById('cookieBanner');
            const acceptBtn = document.getElementById('acceptCookies');
            const rejectBtn = document.getElementById('rejectCookies');
            
            const cookieConsent = localStorage.getItem('scitrade_cookie_consent');
            if (cookieConsent === 'accepted' || cookieConsent === 'rejected') {
                cookieBanner.classList.add('hidden');
            }
            
            acceptBtn.addEventListener('click', function() {
                localStorage.setItem('scitrade_cookie_consent', 'accepted');
                cookieBanner.classList.add('hidden');
            });
            
            rejectBtn.addEventListener('click', function() {
                localStorage.setItem('scitrade_cookie_consent', 'rejected');
                cookieBanner.classList.add('hidden');
            });

            // Iframe detection
            if (window.self !== window.top) {
                document.querySelectorAll('a[href]').forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && !href.startsWith('http') && !href.startsWith('//') && !href.startsWith('#')) {
                        link.setAttribute('target', '_top');
                    }
                });
            }

            // Adjust iframe heights dynamically
            function adjustIframeHeights() {
                const isMobile = window.innerWidth <= 768;
                const isSmallMobile = window.innerWidth <= 480;
                const isTiny = window.innerWidth <= 360;
                
                const descriptionIframe = document.querySelector('.description-iframe iframe');
                const otherIframes = document.querySelectorAll('.iframe-container:not(.description-iframe) iframe');
                
                if (descriptionIframe) {
                    if (isTiny) descriptionIframe.style.height = '450px';
                    else if (isSmallMobile) descriptionIframe.style.height = '480px';
                    else if (isMobile) descriptionIframe.style.height = '520px';
                    else descriptionIframe.style.height = '700px';
                }
                
                otherIframes.forEach(iframe => {
                    if (isTiny) iframe.style.height = '380px';
                    else if (isSmallMobile) iframe.style.height = '420px';
                    else if (isMobile) iframe.style.height = '460px';
                    else iframe.style.height = '600px';
                });
                
                const footerIframe = document.querySelector('.footer-container iframe');
                if (footerIframe) {
                    if (isTiny) footerIframe.style.height = '380px';
                    else if (isSmallMobile) footerIframe.style.height = '400px';
                    else if (isMobile) footerIframe.style.height = '450px';
                    else footerIframe.style.height = '500px';
                }
                
                const headerWrapper = document.querySelector('.header-wrapper');
                if (headerWrapper) {
                    if (isMobile) headerWrapper.style.height = '80vh';
                    else headerWrapper.style.height = '100vh';
                }
            }
            
            window.addEventListener('load', adjustIframeHeights);
            window.addEventListener('resize', adjustIframeHeights);
        })();
    </script>
</body>
</html>
